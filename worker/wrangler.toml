name = "pokesearch-prices"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Collection sync lives in a Durable Object: single-threaded per object, so
# the revision check-and-write is atomic (KV has no compare-and-swap).
[durable_objects]
bindings = [{ name = "COLLECTION_DO", class_name = "CollectionDO" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollectionDO"]

# Secrets (set with `npx wrangler@3 secret put <NAME>` from this directory):
#   SYNC_PASSPHRASE      shared token for /collection GET/PUT (collection sync)
#   EBAY_CLIENT_ID       eBay App ID (Client ID)
#   EBAY_CLIENT_SECRET   eBay Cert ID (Client Secret)
#   JUSTTCG_KEY          JustTCG API key (optional)
#   PPT_KEY              PokemonPriceTracker API key (optional)
#   PRICECHARTING_KEY    PriceCharting token (optional)
